name: Version

# Manages the changesets release cycle:
#   - While changesets are pending: opens/updates a "Version Packages" PR.
#   - When that PR is merged: the version in npm/bulltui/package.json bumps,
#     the auto-tag job below detects it and pushes a v* tag, which triggers
#     the release workflow.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  changesets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-tag:
    needs: changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Tag if version bumped
        run: |
          PREV=$(git show HEAD~1:npm/bulltui/package.json 2>/dev/null \
            | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))" \
            || echo "")
          CURR=$(node -e "console.log(require('./npm/bulltui/package.json').version)")
          if [ -n "$CURR" ] && [ "$PREV" != "$CURR" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git tag "v$CURR"
            git push origin "v$CURR"
            echo "Tagged v$CURR"
          else
            echo "No version bump detected (prev=$PREV curr=$CURR), skipping tag."
          fi
