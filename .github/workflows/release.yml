name: Release

# Triggered by a v* tag (pushed by the auto-tag job in version.yml after a
# changesets version PR is merged). Builds all platform binaries in parallel,
# then publishes the per-platform npm packages, root package, and Docker image.

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build ${{ matrix.npm-pkg }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: bulltui
            npm-pkg: bulltui-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: bulltui
            npm-pkg: bulltui-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: bulltui
            npm-pkg: bulltui-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: bulltui
            npm-pkg: bulltui-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p bulltui
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for npm OIDC trusted publisher
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v6
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage binaries into npm packages
        run: |
          for pkg in bulltui-darwin-arm64 bulltui-darwin-x64 bulltui-linux-x64 bulltui-linux-arm64; do
            cp artifacts/$pkg/bulltui npm/$pkg/bulltui
            chmod +x npm/$pkg/bulltui
          done
      - name: Set versions from tag
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION.replace(/^v/, '');
            const pkgs = [
              'bulltui',
              'bulltui-darwin-arm64', 'bulltui-darwin-x64',
              'bulltui-linux-x64', 'bulltui-linux-arm64',
            ];
            pkgs.forEach(p => {
              const path = \`npm/\${p}/package.json\`;
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = version;
              if (pkg.optionalDependencies) {
                Object.keys(pkg.optionalDependencies).forEach(k => {
                  pkg.optionalDependencies[k] = version;
                });
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            });
            console.log('Set all package versions to', version);
          "
        env:
          VERSION: ${{ github.ref_name }}
      - name: Publish platform packages
        run: |
          for pkg in bulltui-darwin-arm64 bulltui-darwin-x64 bulltui-linux-x64 bulltui-linux-arm64; do
            npm publish npm/$pkg --access public
          done
      - name: Publish root package
        run: npm publish npm/bulltui --access public
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  docker:
    name: Build Docker image (${{ matrix.arch }})
    needs: build
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            artifact: bulltui-linux-x64
          - arch: arm64
            os: ubuntu-24.04-arm
            artifact: bulltui-linux-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - name: Mark binary executable
        run: chmod +x dist/bulltui
      - name: Write release Dockerfile
        run: |
          cat > Dockerfile.release << 'EOF'
          FROM gcr.io/distroless/cc-debian12:nonroot
          COPY dist/bulltui /usr/local/bin/bulltui
          ENV TERM=xterm-256color
          ENTRYPOINT ["/usr/local/bin/bulltui"]
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/vinnymac/bulltui,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p digests
          echo -n "${{ steps.build.outputs.digest }}" > digests/${{ matrix.arch }}
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch }}
          path: digests/${{ matrix.arch }}
          if-no-files-found: error

  docker-merge:
    name: Merge Docker manifests
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digest-*
          path: digests
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/vinnymac/bulltui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/vinnymac/bulltui@%s ' $(cat digests/*))
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
