name: Release

# Triggered by a v* tag cut on the knot with `just release` (after the version
# PR merges) and mirrored here. Builds all platform binaries in parallel, then
# publishes the per-platform npm packages, root package, and Docker image.

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build ${{ matrix.npm-pkg }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: bulltui
            npm-pkg: bulltui-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: bulltui
            npm-pkg: bulltui-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: bulltui
            npm-pkg: bulltui-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: bulltui
            npm-pkg: bulltui-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p bulltui
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for npm OIDC trusted publisher
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v6
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage binaries into npm packages
        run: |
          for pkg in bulltui-darwin-arm64 bulltui-darwin-x64 bulltui-linux-x64 bulltui-linux-arm64; do
            cp artifacts/$pkg/bulltui npm/$pkg/bulltui
            chmod +x npm/$pkg/bulltui
          done
      - name: Set versions and repository from tag
        # CI is the source of truth for both `version` and `repository`. npm
        # provenance (auto-enabled by `id-token: write`) rejects any package
        # whose `repository.url` doesn't match this repo — so we stamp it here
        # rather than trust the checked-in files. That way a `cargo npm generate`
        # regen (or a hand edit) that drops the field can't break a release.
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION.replace(/^v/, '');
            const url = 'git+https://github.com/vinnymac/bulltui.git';
            const pkgs = [
              'bulltui',
              'bulltui-darwin-arm64', 'bulltui-darwin-x64',
              'bulltui-linux-x64', 'bulltui-linux-arm64',
            ];
            pkgs.forEach(p => {
              const path = \`npm/\${p}/package.json\`;
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = version;
              pkg.repository = { type: 'git', url };
              if (p !== 'bulltui') pkg.repository.directory = \`npm/\${p}\`;
              if (pkg.optionalDependencies) {
                Object.keys(pkg.optionalDependencies).forEach(k => {
                  pkg.optionalDependencies[k] = version;
                });
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            });
            console.log('Set all package versions to', version, 'and repository to', url);
          "
        env:
          VERSION: ${{ github.ref_name }}
      - name: Publish platform packages
        # Paths must be `./npm/$pkg` — npm parses a bare `npm/$pkg` as a GitHub
        # `owner/repo` shorthand and tries to `git ls-remote` it, not publish.
        run: |
          for pkg in bulltui-darwin-arm64 bulltui-darwin-x64 bulltui-linux-x64 bulltui-linux-arm64; do
            npm publish ./npm/$pkg --access public
          done
      - name: Publish root package
        run: npm publish ./npm/bulltui --access public
      - name: Package release binaries
        # Archive each binary under its Rust target triple (the cargo-binstall /
        # rustup convention) so the Release page carries ready-to-run builds, not
        # just the source zip. A SHA256SUMS lets people verify what they grabbed.
        run: |
          declare -A targets=(
            [bulltui-darwin-arm64]=aarch64-apple-darwin
            [bulltui-darwin-x64]=x86_64-apple-darwin
            [bulltui-linux-x64]=x86_64-unknown-linux-gnu
            [bulltui-linux-arm64]=aarch64-unknown-linux-gnu
          )
          mkdir -p release-assets
          for pkg in "${!targets[@]}"; do
            target="${targets[$pkg]}"
            install -m 0755 "artifacts/$pkg/bulltui" bulltui
            tar -czf "release-assets/bulltui-${target}.tar.gz" bulltui
            rm bulltui
          done
          ( cd release-assets && sha256sum *.tar.gz > SHA256SUMS )
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*

  docker:
    name: Build Docker image (${{ matrix.arch }})
    needs: build
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            artifact: bulltui-linux-x64
          - arch: arm64
            os: ubuntu-24.04-arm
            artifact: bulltui-linux-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - name: Mark binary executable
        run: chmod +x dist/bulltui
      - name: Write release Dockerfile
        run: |
          cat > Dockerfile.release << 'EOF'
          FROM gcr.io/distroless/cc-debian12:nonroot
          COPY dist/bulltui /usr/local/bin/bulltui
          ENV TERM=xterm-256color
          ENTRYPOINT ["/usr/local/bin/bulltui"]
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/vinnymac/bulltui,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        # Write a trailing newline: the merge step reads `$(cat digests/*)` and
        # relies on whitespace to split the per-arch digests into separate args.
        run: |
          mkdir -p digests
          echo "${{ steps.build.outputs.digest }}" > digests/${{ matrix.arch }}
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch }}
          path: digests/${{ matrix.arch }}
          if-no-files-found: error

  docker-merge:
    name: Merge Docker manifests
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digest-*
          path: digests
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/vinnymac/bulltui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/vinnymac/bulltui@%s ' $(cat digests/*))
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
