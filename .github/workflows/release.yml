name: Release

# Triggered by a v* tag (pushed by the auto-tag job in version.yml after a
# changesets version PR is merged). Builds all platform binaries in parallel,
# then publishes the per-platform npm packages followed by the root package.

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build ${{ matrix.npm-pkg }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: bulltui
            npm-pkg: bulltui-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: bulltui
            npm-pkg: bulltui-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: bulltui
            npm-pkg: bulltui-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: bulltui
            npm-pkg: bulltui-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p bulltui
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for npm OIDC trusted publisher
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v6
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage binaries into npm packages
        run: |
          for pkg in bulltui-darwin-arm64 bulltui-darwin-x64 bulltui-linux-x64 bulltui-linux-arm64; do
            cp artifacts/$pkg/bulltui npm/$pkg/bulltui
            chmod +x npm/$pkg/bulltui
          done
      - name: Set versions from tag
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION.replace(/^v/, '');
            const pkgs = [
              'bulltui',
              'bulltui-darwin-arm64', 'bulltui-darwin-x64',
              'bulltui-linux-x64', 'bulltui-linux-arm64',
            ];
            pkgs.forEach(p => {
              const path = \`npm/\${p}/package.json\`;
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = version;
              if (pkg.optionalDependencies) {
                Object.keys(pkg.optionalDependencies).forEach(k => {
                  pkg.optionalDependencies[k] = version;
                });
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            });
            console.log('Set all package versions to', version);
          "
        env:
          VERSION: ${{ github.ref_name }}
      - name: Publish platform packages
        run: |
          for pkg in bulltui-darwin-arm64 bulltui-darwin-x64 bulltui-linux-x64 bulltui-linux-arm64; do
            npm publish npm/$pkg --access public
          done
      - name: Publish root package
        run: npm publish npm/bulltui --access public
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
