# Lints every push/PR to main with rustfmt and clippy (warnings are errors).
when:
  - event: ["push", "pull_request"]
    branch: ["main"]

engine: microvm

dependencies:
  - rustc
  - cargo
  - rustfmt
  - clippy
  - gcc

environment:
  CARGO_TERM_COLOR: always

steps:
  - name: rustfmt
    command: cargo fmt --all -- --check
  - name: clippy
    command: cargo clippy --workspace --all-targets -- -D warnings
